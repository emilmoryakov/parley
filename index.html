<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Parley — a small chat</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <span class="brand">parley</span>
        <span class="status">
          <span class="status__dot" aria-hidden="true"></span>
          local session
        </span>
      </header>

      <main class="log" id="log" aria-live="polite" aria-label="Conversation">
        <article class="entry entry--peer">
          <p class="entry__meta"><span class="entry__who">parley</span> · earlier</p>
          <p class="entry__body">
            Type below and hit send. Nothing leaves this page — it all lives in the browser.
          </p>
        </article>
      </main>

      <form class="composer" id="composer">
        <input
          type="text"
          id="field"
          class="composer__field"
          placeholder="Write something…"
          autocomplete="off"
          aria-label="Your message"
        />
        <button type="submit" class="composer__send" id="send">Send</button>
      </form>
    </div>

    <script src="chat.js"></script>
  </body>
</html>
